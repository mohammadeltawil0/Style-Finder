name: Deploy Spring Boot to EC2

on:
  push:
    branches: [ "Beta_Release_Images"]
    paths:
      - 'server/**'
  pull_request:
    branches: [ "A_Local" ]
    paths:
      - 'server/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download code onto GitHub's temporary computer
      - name: Checkout Code
        uses: actions/checkout@v6

      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      # Step 3: Build the .jar file!
      - name: Build with Maven
        run: |
          cd server
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # Step 4: Send the .jar file to EC2 | test 2 test 3
      - name: Send jar to EC2 via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "server/target/stylefinder.jar"
          target: "/home/ubuntu/stylefinder"
          strip_components: 2

      # Step 5: Log into EC2 via SSH and restart the systemd service
      - name: Restart Systemd Service via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mv /home/ubuntu/stylefinder/stylefinder.jar /home/ubuntu/stylefinder/stylefinder.jar
            # Restart the app!
            sudo systemctl restart stylefinder
